<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- tailwind + daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="navbar bg-base-100 shadow-sm">
            <div class="flex-1">
                <a class="btn btn-ghost text-2xl font-semibold"><span><img class="h-9 w-[35px]"
                            src="./assets/github-logo.png" alt=""></span>GitHub Issue Tracker</a>
            </div>
            <div class="flex gap-2">
                <label class="input input-bordered flex items-center gap-2">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input id="searchInput" type="text" class="grow" placeholder="Search issues..." />
                </label>
                <button id="searchBtn" class="btn btn-primary">+ New Issue</button>
            </div>
        </div>
    </header>

    <main class="px-28 py-14">
        <!-- tab section -->
        <div class="flex gap-3 p-6 mb-4 bg-base-100 shadow-sm rounded-xl w-full">

            <input id="all-issue" type="radio" name="tabs" class="btn checked:bg-primary checked:text-white"
                aria-label="All" checked />
            <input id="open-issue" type="radio" name="tabs" class="btn checked:bg-primary checked:text-white"
                aria-label="Open" />
            <input id="closed-issue" type="radio" name="tabs" class="btn checked:bg-primary checked:text-white"
                aria-label="Closed" />

        </div>
        <div class="flex gap-3 p-6 bg-base-100 shadow-sm rounded-xl w-full justify-between">
            <div class="flex w-fit gap-3">
                <img class="w-12 h-12" src="./assets/Aperture.png" alt="">
                <div>
                    <h3 class="text-xl font-semibold "><span id="card-length" class="pr-1">50</span>Issue</h3>
                    <p>Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-2 w-auto items-center">
                <p><span class="h-3 w-3 text-green-500"><i class="fa-solid fa-circle"></i></span>Open</p>
                <p><span class="h-3 w-3 text-purple-500"><i class="fa-solid fa-circle"></i></span>Closed</p>
            </div>
        </div>

        <div id="issuesContainer" class="grid grid-cols-4 p-4 bg-slate-50 rounded-xl">

        </div>

        <div id="loadingSpinner" class="hidden justify-center">
            <span class="loading loading-dots loading-xl"></span>
        </div>

        <!-- modal -->
        <div>
            <!-- Open the modal using ID.showModal() method -->
            <div onclick="my_modal_5.showModal()"></div>
            <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
                <div class="modal-box">
                    <h3 id="modalTitle" class="text-2xl font-bold pb-2">Fix broken image uploads</h3>
                    <div class="flex gap-3">
                        <p id="modalStatus" class="bg-green-100 text-green-500 px-2 py-1 rounded-lg">Opened</p>
                        <p class="text-xs font-normal text-slate-500">Opened by Fahim Ahmed</p>
                        <p class="text-xs font-normal text-slate-500">22/02/2026</p>
                    </div>
                    <div id="modalLebels" class="flex pt-2 pb-3 gap-3">
                        <p></p>
                    </div>
                    <p id="modalDescription" class="py-4 text-base font-normal text-slate-600">The navigation menu
                        doesn't collapse properly on mobile devices. Need to fix the responsive behavior.</p>

                    <div class="flex py-2 w-full bg-slate-50 justify-around">
                        <div>
                            <p>Assigne:</p>
                            <p id="modalAuthor">Fahim Ahmed</p>
                        </div>
                        <div>
                            <p>Priority:</p>
                            <p id="modalPriority" class="bg-green-100 text-green-500">High</p>
                        </div>
                    </div>

                    <div class="modal-action">
                        <form method="dialog">
                            <!-- if there is a button in form, it will close the modal -->
                            <button class="btn">Close</button>
                        </form>
                    </div>
                </div>
            </dialog>
        </div>

    </main>

    <script src="./script/script.js"></script>

</body>

</html>
