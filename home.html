<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- tailwind + daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="navbar bg-base-100 shadow-sm">
            <div class="flex-1">
                <a class="btn btn-ghost text-2xl font-semibold"><span><img class="h-9 w-[35px]"
                            src="./assets/github-logo.png" alt=""></span>GitHub Issue Tracker</a>
            </div>
            <div class="flex gap-2">
                <label class="input input-bordered flex items-center gap-2">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" class="grow" placeholder="Search issues..." />
                </label>
                <button class="btn btn-primary">+ New Issue</button>
            </div>
        </div>
    </header>

    <main class="px-28 py-14">
        <!-- tab section -->
        <div class="flex gap-3 p-6 mb-4 bg-base-100 shadow-sm rounded-xl w-full">

            <input id="all-issue" type="radio" name="tabs" class="btn checked:bg-primary checked:text-white" aria-label="All"
                checked />
            <input id="open-issue" type="radio" name="tabs" class="btn checked:bg-primary checked:text-white" aria-label="Open" />
            <input id="closed-issue" type="radio" name="tabs" class="btn checked:bg-primary checked:text-white" aria-label="Closed" />

        </div>
        <div class="flex gap-3 p-6 bg-base-100 shadow-sm rounded-xl w-full justify-between">
            <div class="flex w-fit gap-3">
                <img class="w-12 h-12" src="./assets/Aperture.png" alt="">
                <div>
                    <h3 class="text-xl font-semibold "><span id="card-length" class="pr-1">50</span>Issue</h3>
                    <p>Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-2 w-auto items-center">
                <p><span class="h-3 w-3 text-green-500"><i class="fa-solid fa-circle"></i></span>Open</p>
                <p><span class="h-3 w-3 text-purple-500"><i class="fa-solid fa-circle"></i></span>Closed</p>
            </div>
        </div>

        <div id="issuesContainer" class="grid grid-cols-4 p-4 bg-slate-50 rounded-xl">

        </div>

    </main>

    <script src="./script/script.js"></script>

</body>

</html>
