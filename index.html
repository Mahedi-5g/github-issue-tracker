<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- tailwind + daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body class=" bg-slate-50 mx-auto h-[500px] my-7 max-w-md shadow-sm">

    <div class="">
        <img class="mx-auto pt-5" src="assets/github-logo.png" alt="">
    </div>
    <div class="text-center py-2">
        <h1 class="font-semibold text-2xl text-slate-700">GitHub Issues Tracker</h2>
            <p class="font-normal text-slate-600">Sign in to manage your issues</p>
    </div>
    <div class="flex items-center justify-center">
        <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4 items-center">

        <label class="label text-slate-800 font-semibold ">Username</label>
        <input id="username" type="input" class="input" placeholder="Enter Username" />
        <p class="text-sky-500">Default:admin</p>

        <label class="label  text-slate-800 font-semibold">Password</label>
        <input id="passId" type="password" class="input" placeholder="Enter Password" />
        <p class="text-sky-500">Default:admin123</p>

        <button id="login-btn" class="btn btn-primary mt-4">Login</button>
    </fieldset>
    </div>
    


    <script src="./script/login.js"></script>
    
</body>

</html>
